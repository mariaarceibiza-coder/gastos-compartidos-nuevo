name: Deploy Firebase Functions on merge

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GASTOS_FAMILIA_MARCE }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --project gastos-familia-marce

      - name: Allow unauthenticated access
        run: |
          gcloud run services add-iam-policy-binding getmensajecoach \
            --region=europe-west1 \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project=gastos-familia-marce
